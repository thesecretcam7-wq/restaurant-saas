<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Limpiando cache de Eccofood</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #030303;
        color: #fffaf0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(360px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid rgba(212, 175, 55, 0.24);
        border-radius: 24px;
        background: linear-gradient(145deg, rgba(36, 32, 23, 0.94), rgba(7, 7, 7, 0.98));
        box-shadow: 0 26px 70px rgba(0, 0, 0, 0.48), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        text-align: center;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: rgba(248, 243, 232, 0.68);
        font-weight: 700;
        line-height: 1.5;
      }
      .bar {
        height: 8px;
        margin-top: 22px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }
      .bar span {
        display: block;
        width: 45%;
        height: 100%;
        border-radius: inherit;
        background: #d4af37;
        animation: load 1s ease-in-out infinite;
      }
      @keyframes load {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(250%); }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Limpiando cache</h1>
      <p>Estamos quitando la version vieja guardada en este navegador.</p>
      <div class="bar"><span></span></div>
    </main>
    <script>
      (async function () {
        const params = new URLSearchParams(location.search);
        const target = params.get('to') || '/parrillaburgers/menu';
        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        } catch (error) {
          console.warn('No se pudo limpiar toda la cache', error);
        }
        location.replace(target + (target.includes('?') ? '&' : '?') + 'fresh=' + Date.now());
      })();
    </script>
  </body>
</html>
